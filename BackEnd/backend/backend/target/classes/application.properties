# === Configuration serveur ===
server.port=${PORT:8080}

# === Base de données PostgreSQL (Render) ===
# Render fournit automatiquement la variable d'environnement JDBC_DATABASE_URL
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/twincare}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === Upload de fichiers ===
# Render n'a pas de stockage persistant ; les fichiers seront perdus à chaque redémarrage.
# Pour la production, utilise plutôt Cloudinary ou Supabase Storage.
file.upload-dir=uploads

# Taille max des fichiers
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# === JWT ===
# La clé secrète doit être définie comme variable d'environnement sur Render
jwt.secret=${JWT_SECRET:1desCleSecretePourTwincare1274En2026JWT}
jwt.expiration=86400000

# === Logs ===
logging.level.backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN